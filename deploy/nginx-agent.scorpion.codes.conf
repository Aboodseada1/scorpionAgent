# Reverse proxy for the Go voice agent (bin/agent on 127.0.0.1:8001).
# Install: sudo cp deploy/nginx-agent.scorpion.codes.conf /etc/nginx/sites-available/agent.scorpion.codes
#          sudo ln -sf /etc/nginx/sites-available/agent.scorpion.codes /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS:     sudo certbot --nginx -d agent.scorpion.codes --redirect --non-interactive --agree-tos
#          (uses existing Certbot account on this host; ensure DNS A/AAAA points here first)

server {
    listen 80;
    listen [::]:80;
    server_name agent.scorpion.codes;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }
}

# Certbot will add a duplicate server { listen 443 ssl; ... } or modify this file.
# If you prefer manual TLS, duplicate the block on 443 with:
#   ssl_certificate /etc/letsencrypt/live/agent.scorpion.codes/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/agent.scorpion.codes/privkey.pem;
